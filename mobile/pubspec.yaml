name: jp_tech_support
description: J&P Tech Support - App Móvil para Servicios Técnicos

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Geolocation & Maps
  geolocator: ^10.1.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Real-time Socket
  socket_io_client: ^2.0.3+1
  
  # UI Components
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7
  file_picker: ^8.1.2
  flutter_rating_bar: ^4.0.1
  pin_code_fields: ^8.0.1
  intl: ^0.19.0
  
  # Icons
  cupertino_icons: ^1.0.6
  
  # Notifications
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
